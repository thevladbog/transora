spring:
  application:
    name: transora-core
  data:
    redis:
      host: ${TRANSORA_REDIS_HOST:localhost}
      port: ${TRANSORA_REDIS_PORT:6379}
  datasource:
    url: ${TRANSORA_DB_URL:jdbc:postgresql://localhost:5432/transora}
    username: ${TRANSORA_DB_USERNAME:transora}
    password: ${TRANSORA_DB_PASSWORD:transora}
  flyway:
    enabled: true
    schemas: app,iam,scheduling,inventory,sales,documents,notifications
    default-schema: app

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: ${TRANSORA_HTTP_PORT:8080}

springdoc:
  api-docs:
    path: /v3/api-docs

transora:
  iam:
    seed-data: false
  outbox:
    poll-interval-ms: 1000
  documents:
    storage-path: ${TRANSORA_DOCUMENTS_PATH:./data/documents}
  hardware:
    base-url: ${TRANSORA_HARDWARE_URL:}
    agent-token: ${TRANSORA_HARDWARE_TOKEN:dev-agent-token}
  scheduling:
    generation-horizon-days: 60
    generation-cron: "0 0 2 * * *"
    lifecycle-auto-advance: false
  board:
    window-before-min: 30
    window-after-min: 180
  notifications:
    storage-path: ${TRANSORA_AUDIO_PATH:./data/audio}
    playback-poll-interval-ms: 5000
    departure-scheduler-cron: "0 * * * * *"
  station-agent:
    sync-horizon-hours: 48
    sync-window-before-min: 30
    ping-interval-ms: 30000
    ping-enabled: true

