services:
  postgres:
    image: postgres:18.4
    container_name: transora-postgres
    environment:
      POSTGRES_DB: transora
      POSTGRES_USER: transora
      POSTGRES_PASSWORD: transora
    ports:
      - "5432:5432"
    volumes:
      - transora-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transora -d transora"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: transora-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build: .
    container_name: transora-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock-hw:
        condition: service_started
    environment:
      TRANSORA_DB_URL: jdbc:postgresql://postgres:5432/transora
      TRANSORA_DB_USERNAME: transora
      TRANSORA_DB_PASSWORD: transora
      TRANSORA_REDIS_HOST: redis
      TRANSORA_REDIS_PORT: 6379
      TRANSORA_HARDWARE_URL: http://mock-hw:9090
      SPRING_PROFILES_ACTIVE: dev
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  mock-hw:
    build:
      context: .
      dockerfile: hardware-agent/Dockerfile
    container_name: transora-mock-hw
    ports:
      - "9090:9090"

  station-agent:
    build:
      context: .
      dockerfile: station-agent/Dockerfile
    container_name: transora-station-agent
    depends_on:
      backend:
        condition: service_healthy
    environment:
      CORE_HTTP_URL: http://backend:8080
      CORE_WS_URL: ws://backend:8080/ws/stations
      STATION_ID: "00000000-0000-0000-0000-000000000001"
      CORE_LOGIN: station_agent
      CORE_PASSWORD: station_agent
      STATION_AGENT_TOKEN: ${STATION_AGENT_TOKEN:-}
      AGENT_LISTEN: ":8081"
      SCHEDULE_CACHE_DB: /app/data/schedule_cache.db
      BOARDING_BUFFER_DB: /app/data/boarding_buffer.db
    ports:
      - "8081:8081"
    volumes:
      - station-agent-data:/app/data

volumes:
  transora-postgres-data:
  station-agent-data:
